# Cloudflare Workers deployment configuration.
# Used by: pnpm cf:deploy          → production worker (ssi-scoreboard)
#          pnpm cf:deploy:staging   → staging worker  (ssi-scoreboard-staging)
#
# Secrets must be set via wrangler CLI, NOT committed here:
#   Production:  wrangler secret put SSI_API_KEY
#                wrangler secret put UPSTASH_REDIS_REST_URL
#                wrangler secret put UPSTASH_REDIS_REST_TOKEN
#                wrangler secret put CACHE_PURGE_SECRET
#   Staging:     wrangler secret put SSI_API_KEY --env staging
#                wrangler secret put UPSTASH_REDIS_REST_URL --env staging
#                wrangler secret put UPSTASH_REDIS_REST_TOKEN --env staging
#                wrangler secret put CACHE_PURGE_SECRET --env staging
#                wrangler secret put CACHE_KEY_PREFIX --env staging   # value: "staging:"

name = "ssi-scoreboard"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]
main = ".open-next/worker.js"
workers_dev = true
preview_urls = false
# Wrangler's esbuild defaults to keepNames=true, which transforms named function
# bodies (e.g. inside next-themes' theme-init script) with __name() helpers.
# Those helpers are not in scope when next-themes serialises the function via
# .toString() and injects it as a browser-side <script> tag → ReferenceError.
# Setting keep_names=false disables that transform without affecting behaviour,
# since @opennextjs/cloudflare already bundles with minifyIdentifiers=false.
keep_names = false

# Paid plan: allow up to 30 s of CPU per request.
# Covers the compare fan-out (multiple parallel GraphQL fetches) and
# Satori-based OG image generation which can be CPU-intensive.
[limits]
cpu_ms = 30000

# Smart Placement: Cloudflare automatically routes each invocation to the
# datacenter closest to our upstream services (SSI GraphQL API + Upstash Redis),
# cutting round-trip latency without any manual region pinning.
[placement]
mode = "smart"

[ai]
binding = "AI"

[assets]
directory = ".open-next/assets"

[observability]
enabled = true

# Staging environment — separate worker, inherits all top-level settings except name.
# Secrets set independently via: wrangler secret put <NAME> --env staging
[env.staging]
name = "ssi-scoreboard-staging"
