# Cloudflare Workers deployment configuration.
# Used by: pnpm cf:deploy          → production worker (ssi-scoreboard)
#          pnpm cf:deploy:staging   → staging worker  (ssi-scoreboard-staging)
#
# Secrets must be set via wrangler CLI, NOT committed here:
#   Production:  wrangler secret put SSI_API_KEY
#                wrangler secret put SSI_SERVICE_EMAIL          # bot account login (lib/ssi-auth.ts)
#                wrangler secret put SSI_SERVICE_PASSWORD       # bot account password
#                wrangler secret put UPSTASH_REDIS_REST_URL
#                wrangler secret put UPSTASH_REDIS_REST_TOKEN
#                wrangler secret put CACHE_PURGE_SECRET
#   Staging:     wrangler secret put SSI_API_KEY --env staging
#                wrangler secret put SSI_SERVICE_EMAIL --env staging
#                wrangler secret put SSI_SERVICE_PASSWORD --env staging
#                wrangler secret put UPSTASH_REDIS_REST_URL --env staging
#                wrangler secret put UPSTASH_REDIS_REST_TOKEN --env staging
#                wrangler secret put CACHE_PURGE_SECRET --env staging
#                wrangler secret put CACHE_KEY_PREFIX --env staging   # value: "staging:"
#
# D1 databases: run `pnpm tsx scripts/setup-d1.ts` to provision automatically.
# Or manually:
#   Production:  wrangler d1 create ssi-scoreboard-app-db
#   Staging:     wrangler d1 create ssi-scoreboard-app-db-staging
#   Migrations:  wrangler d1 migrations apply APP_DB [--env staging]
#
# Non-secret vars (AI coaching feature) are committed here under [vars] /
# [env.staging.vars] so they are version-controlled alongside the binding.

name = "ssi-scoreboard"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]
main = ".open-next/worker.js"
workers_dev = true
preview_urls = false
# Wrangler's esbuild defaults to keepNames=true, which transforms named function
# bodies (e.g. inside next-themes' theme-init script) with __name() helpers.
# Those helpers are not in scope when next-themes serialises the function via
# .toString() and injects it as a browser-side <script> tag → ReferenceError.
# Setting keep_names=false disables that transform without affecting behaviour,
# since @opennextjs/cloudflare already bundles with minifyIdentifiers=false.
keep_names = false

# Paid plan: allow up to 30 s of CPU per request.
# Covers the compare fan-out (multiple parallel GraphQL fetches) and
# Satori-based OG image generation which can be CPU-intensive.
[limits]
cpu_ms = 30000

# Smart Placement: Cloudflare automatically routes each invocation to the
# datacenter closest to our upstream services (SSI GraphQL API + Upstash Redis),
# cutting round-trip latency without any manual region pinning.
[placement]
mode = "smart"

[ai]
binding = "AI"

[vars]
AI_PROVIDER = "cloudflare"
AI_MODEL = "@cf/meta/llama-3.1-8b-instruct"

[env.staging.vars]
AI_PROVIDER = "cloudflare"
AI_MODEL = "@cf/meta/llama-3.1-8b-instruct"

# D1 database for persistent app data (shooter profiles, match indices, popularity).
# Run `pnpm tsx scripts/setup-d1.ts` to create and patch this ID automatically.
#
# Read replication is enabled (read_replication.mode = "auto") on this database.
# It is a *database-level* property set via the CF API/dashboard, NOT a
# wrangler.toml field, so it persists independent of deploys. The read paths in
# lib/db-d1.ts route through the Sessions API (readDb()/withSession) so reads
# can be served by replicas; without that, replicas exist but receive no
# traffic. To re-enable after re-provisioning:
#   PUT /accounts/{account}/d1/database/{id}  {"read_replication":{"mode":"auto"}}
[[d1_databases]]
binding = "APP_DB"
database_name = "ssi-scoreboard-app-db-eu"
database_id = "4a3d6cf5-31ce-4775-84f5-f9abee4206e2"  # patched by scripts/setup-d1.ts
migrations_dir = "migrations"

# R2 bucket binding for *reading* the telemetry Parquet files written by
# Pipelines. The admin health dashboard (app/admin/health) lists+fetches recent
# Parquet via this binding, decodes them, and renders aggregates. Writes are
# owned by the Pipelines stream; this binding is read-only by convention.
[[r2_buckets]]
binding = "TELEMETRY_BUCKET"
bucket_name = "ssi-scoreboard-telemetry"

# Cloudflare Pipelines stream for telemetry events — see lib/telemetry-sinks-cf.ts.
# The stream coalesces events across all isolates and writes Parquet batches to
# R2 every 300s (or every 5MB). One-time provisioning:
#   wrangler pipelines streams create ssi_telemetry --http-enabled false
#   wrangler pipelines sinks create ssi_telemetry_r2 \
#     --type r2 --bucket ssi-scoreboard-telemetry \
#     --format parquet --compression zstd \
#     --path 'pipelines/cache-telemetry/' --partitioning '%Y-%m-%d' \
#     --roll-size 5 --roll-interval 300
#   wrangler pipelines create ssi_telemetry \
#     --sql 'INSERT INTO ssi_telemetry_r2 SELECT * FROM ssi_telemetry'
# The `pipeline` field below is the *stream* id (CF's wrangler.toml field name
# is historical — confusing but correct). Get it from `wrangler pipelines streams list`.
[[pipelines]]
binding = "TELEMETRY_PIPELINE"
pipeline = "506f6888c6c9478e99ef925d50ce9aa5"

[assets]
directory = ".open-next/assets"

[observability]
enabled = true

# Staging environment — separate worker, inherits all top-level settings except name.
# Secrets set independently via: wrangler secret put <NAME> --env staging
[env.staging]
name = "ssi-scoreboard-staging"

# The top-level [ai] binding is not automatically inherited by named environments
# in Wrangler — declare it explicitly so the staging worker gets the AI binding.
[env.staging.ai]
binding = "AI"

# The top-level [[d1_databases]] binding is not automatically inherited by named
# environments in Wrangler — declare it explicitly for staging.
[[env.staging.d1_databases]]
binding = "APP_DB"
database_name = "ssi-scoreboard-app-db-staging-eu"
database_id = "1b1c7faf-c206-41f6-9557-adbdf1c0ba18"  # patched by scripts/setup-d1.ts
migrations_dir = "migrations"

# Staging R2 read binding for the telemetry dashboard.
[[env.staging.r2_buckets]]
binding = "TELEMETRY_BUCKET"
bucket_name = "ssi-scoreboard-telemetry-staging"

# Staging Pipelines stream (same provisioning as prod, with `_staging` suffix
# and the staging bucket name). Stream id captured below; do not copy the prod id.
[[env.staging.pipelines]]
binding = "TELEMETRY_PIPELINE"
pipeline = "d2fa22626af04c48bd9914574f9014a8"
