<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 1280px;
      height: 640px;
      overflow: hidden;
      background: #0a0a0a;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    }

    .container {
      display: flex;
      align-items: center;
      width: 1280px;
      height: 640px;
      padding: 0 80px;
      position: relative;
      gap: 72px;
    }

    /* Dot-grid background texture */
    .bg-grid {
      position: absolute;
      inset: 0;
      background-image: radial-gradient(circle, rgba(255,255,255,0.04) 1px, transparent 1px);
      background-size: 36px 36px;
      pointer-events: none;
    }

    /* Radial glow behind the icon */
    .icon-glow {
      position: absolute;
      left: -20px;
      top: 50%;
      transform: translateY(-50%);
      width: 480px;
      height: 480px;
      background: radial-gradient(circle at 50% 50%, rgba(0,188,124,0.12) 0%, transparent 65%);
      pointer-events: none;
    }

    .icon-col {
      flex-shrink: 0;
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .icon-col svg {
      width: 300px;
      height: 300px;
    }

    /* Vertical separator */
    .divider {
      flex-shrink: 0;
      width: 1px;
      height: 280px;
      background: linear-gradient(to bottom, transparent 0%, #1f2937 30%, #1f2937 70%, transparent 100%);
    }

    .text-col {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 0;
      position: relative;
      z-index: 1;
    }

    .eyebrow {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #00bc7c;
      margin-bottom: 14px;
    }

    .app-name {
      font-size: 76px;
      font-weight: 900;
      line-height: 0.95;
      letter-spacing: -3px;
      color: #f9fafb;
    }

    .app-name .accent {
      color: #00bc7c;
    }

    .tagline {
      margin-top: 22px;
      font-size: 22px;
      font-weight: 400;
      color: #6b7280;
      line-height: 1.5;
    }

    .tagline strong {
      color: #9ca3af;
      font-weight: 500;
    }

    .badges {
      display: flex;
      gap: 10px;
      margin-top: 28px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: rgba(255,255,255,0.04);
      border: 1px solid #1f2937;
      border-radius: 100px;
      padding: 7px 16px;
      font-size: 13px;
      font-weight: 500;
      color: #6b7280;
    }

    .badge-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #00bc7c;
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="bg-grid"></div>
    <div class="icon-glow"></div>

    <div class="icon-col">
      __ICON_SVG__
    </div>

    <div class="divider"></div>

    <div class="text-col">
      <div class="eyebrow">IPSC Shooting Sports</div>
      <div class="app-name">__APP_NAME_PREFIX__<br><span class="accent">__APP_NAME_SUFFIX__</span></div>
      <div class="tagline">__TAGLINE__</div>
      <div class="badges">
        <div class="badge"><div class="badge-dot"></div>Real-time</div>
        <div class="badge"><div class="badge-dot"></div>Mobile-first</div>
        <div class="badge"><div class="badge-dot"></div>Open source</div>
      </div>
    </div>
  </div>
</body>
</html>
