services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --maxmemory 100mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M

  app:
    build:
      context: .
    ports:
      - "${PORT:-3666}:3000"
    environment:
      SSI_API_KEY: ${SSI_API_KEY}
      REDIS_URL: redis://redis:6379
      CACHE_PURGE_SECRET: ${CACHE_PURGE_SECRET}
    depends_on: [redis]
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: 1G
        reservations:
          memory: 256M

volumes:
  redis_data:
