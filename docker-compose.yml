services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data

  app:
    build:
      context: .
    ports:
      - "${PORT:-3666}:3000"
    environment:
      SSI_API_KEY: ${SSI_API_KEY}
      REDIS_URL: redis://redis:6379
      CACHE_PURGE_SECRET: ${CACHE_PURGE_SECRET}
    depends_on: [redis]
    restart: unless-stopped

volumes:
  redis_data:
