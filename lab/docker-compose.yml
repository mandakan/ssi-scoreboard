services:
  engine:
    build: .
    volumes:
      - ./data:/app/data
    environment:
      CACHE_PURGE_SECRET: ${CACHE_PURGE_SECRET}
      APP_URL: ${APP_URL:-http://host.docker.internal:3000}
    ports:
      - "8000:8000"

  jupyter:
    build: .
    volumes:
      - ./data:/app/data
      - ./notebooks:/app/notebooks
      - ./src:/app/src
    command: ["uv", "run", "jupyter", "lab", "--ip=0.0.0.0", "--allow-root"]
    ports:
      - "8888:8888"
    profiles: [jupyter]
