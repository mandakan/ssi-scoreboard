name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Detect which areas of the repo changed so downstream jobs can be skipped.
  # ---------------------------------------------------------------------------
  changes:
    runs-on: ubuntu-latest
    outputs:
      scoreboard: ${{ steps.filter.outputs.scoreboard }}
      discord: ${{ steps.filter.outputs.discord }}
      lab: ${{ steps.filter.outputs.lab }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            scoreboard:
              - 'app/**'
              - 'components/**'
              - 'hooks/**'
              - 'lib/**'
              - 'mcp/**'
              - 'public/**'
              - 'scripts/**'
              - 'tests/**'
              - 'migrations/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'tsconfig.json'
              - 'next.config.*'
              - 'tailwind.config.*'
              - 'postcss.config.*'
              - 'eslint.config.*'
              - 'vitest.config.*'
              - 'playwright.config.*'
              # Run the full pipeline when CI itself changes, so workflow edits
              # (e.g. the Playwright install steps) are exercised on their own PR.
              - '.github/workflows/ci.yml'
            discord:
              - 'discord/**'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
            lab:
              - 'lab/**'

  # ---------------------------------------------------------------------------
  # Scoreboard: lint → typecheck → test → build → e2e
  # ---------------------------------------------------------------------------
  scoreboard:
    needs: changes
    if: needs.changes.outputs.scoreboard == 'true'
    runs-on: ubuntu-latest
    # Run inside the official Playwright image so the browsers are pre-baked and
    # we never hit cdn.playwright.dev at CI time. The download-at-runtime step
    # was hanging in end-of-transfer finalization on the hosted runner (started
    # ~2026-06-01, deterministic across re-runs) and failing CI with no code
    # fault. The image tag MUST track the @playwright/test version in
    # package.json (currently 1.58.2) -- a mismatch makes Playwright try to
    # download the matching browser at runtime, reintroducing the failure.
    # --user 1001 is the image's pwuser, per Playwright's CI guidance.
    container:
      image: mcr.microsoft.com/playwright:v1.58.2-noble
      options: --user 1001
    # A healthy run is 3-7 min; this is a backstop so a hung step fails fast
    # instead of running to GitHub's 6h job default.
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Get pnpm store path
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - run: pnpm install --frozen-lockfile

      - name: Audit dependencies
        run: pnpm audit --prod --audit-level=critical

      - run: pnpm lint   # eslint .

      - run: pnpm typecheck   # tsc --noEmit

      - run: pnpm validate:ssi-queries   # static check vs scripts/ssi-schema-snapshot.json

      - run: pnpm test

      - run: pnpm build
        env:
          SSI_API_KEY: ${{ secrets.SSI_API_KEY }}

      - name: Prepare standalone server for e2e
        run: |
          cp -r .next/static .next/standalone/.next/static
          cp -r public .next/standalone/public

      # No "playwright install" step: the container image already ships the
      # browsers matching @playwright/test 1.58.2 (see the container tag above).
      # Guard against drift -- if package.json's Playwright is bumped without
      # bumping the container tag, e2e would silently fall back to the broken
      # runtime download. Fail fast with a clear message instead.
      - name: Verify Playwright version matches container image
        run: |
          want=1.58.2
          got=$(pnpm exec playwright --version | cut -d' ' -f2)
          if [ "$got" != "$want" ]; then
            echo "::error::@playwright/test is $got but the CI container is pinned to v$want." \
                 "Bump the 'mcr.microsoft.com/playwright:v...' image tag in this workflow to match." >&2
            exit 1
          fi

      - run: pnpm test:e2e
        timeout-minutes: 10
        env:
          SSI_API_KEY: dummy_key_for_e2e

      - uses: actions/upload-artifact@v6
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/

  # ---------------------------------------------------------------------------
  # Discord bot: typecheck → test
  # ---------------------------------------------------------------------------
  discord:
    needs: changes
    if: needs.changes.outputs.discord == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Get pnpm store path
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - run: pnpm install --frozen-lockfile

      - name: Typecheck
        working-directory: discord
        run: pnpm typecheck

      - name: Test
        working-directory: discord
        run: pnpm test

  # ---------------------------------------------------------------------------
  # Lab: lint → typecheck → test (Python)
  # ---------------------------------------------------------------------------
  lab:
    needs: changes
    if: needs.changes.outputs.lab == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        working-directory: lab
        run: uv sync --extra dev

      - name: Lint
        working-directory: lab
        run: uv run ruff check src/

      - name: Typecheck
        working-directory: lab
        run: uv run mypy src/

      - name: Test
        working-directory: lab
        run: uv run pytest
