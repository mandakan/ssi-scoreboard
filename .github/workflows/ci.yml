name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Detect which areas of the repo changed so downstream jobs can be skipped.
  # ---------------------------------------------------------------------------
  changes:
    runs-on: ubuntu-latest
    outputs:
      scoreboard: ${{ steps.filter.outputs.scoreboard }}
      discord: ${{ steps.filter.outputs.discord }}
      lab: ${{ steps.filter.outputs.lab }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            scoreboard:
              - 'app/**'
              - 'components/**'
              - 'hooks/**'
              - 'lib/**'
              - 'mcp/**'
              - 'public/**'
              - 'scripts/**'
              - 'tests/**'
              - 'migrations/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'tsconfig.json'
              - 'next.config.*'
              - 'tailwind.config.*'
              - 'postcss.config.*'
              - 'eslint.config.*'
              - 'vitest.config.*'
              - 'playwright.config.*'
            discord:
              - 'discord/**'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
            lab:
              - 'lab/**'

  # ---------------------------------------------------------------------------
  # Scoreboard: lint → typecheck → test → build → e2e
  # ---------------------------------------------------------------------------
  scoreboard:
    needs: changes
    if: needs.changes.outputs.scoreboard == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Get pnpm store path
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - run: pnpm install --frozen-lockfile

      - name: Audit dependencies
        run: pnpm audit --prod --audit-level=critical

      - run: pnpm lint   # eslint .

      - run: pnpm typecheck   # tsc --noEmit

      - run: pnpm test

      - run: pnpm build
        env:
          SSI_API_KEY: ${{ secrets.SSI_API_KEY }}

      - name: Prepare standalone server for e2e
        run: |
          cp -r .next/static .next/standalone/.next/static
          cp -r public .next/standalone/public

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - run: pnpm test:e2e
        env:
          SSI_API_KEY: dummy_key_for_e2e

      - uses: actions/upload-artifact@v6
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/

  # ---------------------------------------------------------------------------
  # Discord bot: typecheck → test
  # ---------------------------------------------------------------------------
  discord:
    needs: changes
    if: needs.changes.outputs.discord == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Get pnpm store path
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - run: pnpm install --frozen-lockfile

      - name: Typecheck
        working-directory: discord
        run: pnpm typecheck

      - name: Test
        working-directory: discord
        run: pnpm test

  # ---------------------------------------------------------------------------
  # Lab: lint → typecheck → test (Python)
  # ---------------------------------------------------------------------------
  lab:
    needs: changes
    if: needs.changes.outputs.lab == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        working-directory: lab
        run: uv sync --extra dev

      - name: Lint
        working-directory: lab
        run: uv run ruff check src/

      - name: Typecheck
        working-directory: lab
        run: uv run mypy src/

      - name: Test
        working-directory: lab
        run: uv run pytest
