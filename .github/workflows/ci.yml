name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Detect which areas of the repo changed so downstream jobs can be skipped.
  # ---------------------------------------------------------------------------
  changes:
    runs-on: ubuntu-latest
    outputs:
      scoreboard: ${{ steps.filter.outputs.scoreboard }}
      discord: ${{ steps.filter.outputs.discord }}
      lab: ${{ steps.filter.outputs.lab }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            scoreboard:
              - 'app/**'
              - 'components/**'
              - 'hooks/**'
              - 'lib/**'
              - 'mcp/**'
              - 'public/**'
              - 'scripts/**'
              - 'tests/**'
              - 'migrations/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'tsconfig.json'
              - 'next.config.*'
              - 'tailwind.config.*'
              - 'postcss.config.*'
              - 'eslint.config.*'
              - 'vitest.config.*'
              - 'playwright.config.*'
              # Run the full pipeline when CI itself changes, so workflow edits
              # (e.g. the Playwright install steps) are exercised on their own PR.
              - '.github/workflows/ci.yml'
            discord:
              - 'discord/**'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
            lab:
              - 'lab/**'

  # ---------------------------------------------------------------------------
  # Scoreboard: lint → typecheck → test → build → e2e
  # ---------------------------------------------------------------------------
  scoreboard:
    needs: changes
    if: needs.changes.outputs.scoreboard == 'true'
    runs-on: ubuntu-latest
    # A healthy run is 3-7 min; this is a backstop so a hung step fails fast
    # instead of running to GitHub's 6h job default. The e2e steps below carry
    # tighter per-step limits since the Playwright install / test:e2e step is
    # the one that occasionally hangs on the runner.
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Get pnpm store path
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - run: pnpm install --frozen-lockfile

      - name: Audit dependencies
        run: pnpm audit --prod --audit-level=critical

      - run: pnpm lint   # eslint .

      - run: pnpm typecheck   # tsc --noEmit

      - run: pnpm validate:ssi-queries   # static check vs scripts/ssi-schema-snapshot.json

      - run: pnpm test

      - run: pnpm build
        env:
          SSI_API_KEY: ${{ secrets.SSI_API_KEY }}

      - name: Prepare standalone server for e2e
        run: |
          cp -r .next/static .next/standalone/.next/static
          cp -r public .next/standalone/public

      # The Chromium binary download (~150MB) has been hanging to the 6-min
      # step timeout on the GitHub-hosted runner (reliably, across re-runs),
      # failing CI with no code fault. Two defences:
      #   1. Cache ~/.cache/ms-playwright keyed on the Playwright version, so
      #      steady-state runs restore the binary and skip the download.
      #   2. On a cache miss, retry the download with a PER-ATTEMPT timeout, so
      #      one stalled attempt is killed at 3 min and retried instead of
      #      eating the whole step budget. Cache is saved only after the binary
      #      install succeeds (split restore/save), so a partial/hung download
      #      is never cached.
      # OS-level apt deps are not in the cache, so install-deps always runs
      # (it's quick).
      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(pnpm exec playwright --version | cut -d' ' -f2)" >> "$GITHUB_OUTPUT"

      - name: Restore Playwright browser cache
        id: playwright-cache
        uses: actions/cache/restore@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright browser binary (cache miss, retried)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: |
          ok=
          for i in 1 2 3; do
            if timeout 180 pnpm exec playwright install chromium; then ok=1; break; fi
            echo "playwright install attempt $i failed or stalled; retrying in 10s..." >&2
            sleep 10
          done
          [ -n "$ok" ]
        timeout-minutes: 12

      - name: Save Playwright browser cache
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright OS deps
        run: pnpm exec playwright install-deps chromium
        timeout-minutes: 5

      - run: pnpm test:e2e
        timeout-minutes: 10
        env:
          SSI_API_KEY: dummy_key_for_e2e

      - uses: actions/upload-artifact@v6
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/

  # ---------------------------------------------------------------------------
  # Discord bot: typecheck → test
  # ---------------------------------------------------------------------------
  discord:
    needs: changes
    if: needs.changes.outputs.discord == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Get pnpm store path
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - run: pnpm install --frozen-lockfile

      - name: Typecheck
        working-directory: discord
        run: pnpm typecheck

      - name: Test
        working-directory: discord
        run: pnpm test

  # ---------------------------------------------------------------------------
  # Lab: lint → typecheck → test (Python)
  # ---------------------------------------------------------------------------
  lab:
    needs: changes
    if: needs.changes.outputs.lab == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        working-directory: lab
        run: uv sync --extra dev

      - name: Lint
        working-directory: lab
        run: uv run ruff check src/

      - name: Typecheck
        working-directory: lab
        run: uv run mypy src/

      - name: Test
        working-directory: lab
        run: uv run pytest
