name: Warm Cache

on:
  # Nightly schedule disabled — uncomment to re-enable:
  # schedule:
  #   - cron: '15 3 * * *'

  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        type: choice
        options: [staging, production]
        required: true
        default: staging
      level:
        description: 'Minimum event level'
        type: choice
        options: [l3plus, l2plus, l4plus, all]
        default: l3plus
      country:
        description: 'Country filter (ISO-3, e.g. SWE) — leave blank for all'
        required: false
        default: ''
      after:
        description: 'Start date lower bound (YYYY-MM-DD) — default: 5 years ago'
        required: false
        default: ''
      before:
        description: 'Start date upper bound (YYYY-MM-DD) — default: 4 days ago'
        required: false
        default: ''
      delay:
        description: 'Delay between API requests (ms)'
        required: false
        default: '2000'
      jitter:
        description: 'Add ±50% random jitter to each delay'
        type: boolean
        default: true
      limit:
        description: 'Max matches to warm (blank = unlimited)'
        required: false
        default: ''
      force:
        description: 'Purge + re-warm entries already cached'
        type: boolean
        default: false
      dry_run:
        description: 'Dry run — list matches without warming'
        type: boolean
        default: false
      skip_scorecards:
        description: 'Skip scorecards + fingerprints (only warm GetMatch)'
        type: boolean
        default: false
      upcoming:
        description: 'Warm upcoming/future matches (populates matches domain table for shooter dashboards)'
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  warm:
    runs-on: ubuntu-latest
    # schedule trigger has no inputs — default to production
    environment: ${{ github.event_name == 'schedule' && 'production' || inputs.environment }}
    timeout-minutes: 240
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Get pnpm store path
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - run: pnpm install --frozen-lockfile

      - name: Verify required secrets
        run: |
          missing=()
          [ -z "$CACHE_PURGE_SECRET" ] && missing+=("CACHE_PURGE_SECRET")
          [ -z "$APP_URL" ]            && missing+=("APP_URL (environment variable)")
          if [ ${#missing[@]} -gt 0 ]; then
            ENV="${{ github.event_name == 'schedule' && 'production' || inputs.environment }}"
            echo "ERROR: Missing required configuration in the '${ENV}' environment:"
            printf '  - %s\n' "${missing[@]}"
            echo ""
            echo "Add secrets under Settings → Environments → ${ENV} → Secrets."
            echo "Add APP_URL under Settings → Environments → ${ENV} → Variables."
            exit 1
          fi
        env:
          CACHE_PURGE_SECRET: ${{ secrets.CACHE_PURGE_SECRET }}
          APP_URL: ${{ vars.APP_URL }}

      - name: Run cache warmer
        env:
          CACHE_PURGE_SECRET: ${{ secrets.CACHE_PURGE_SECRET }}
          # schedule trigger: hardcoded sensible defaults (no inputs available)
          # workflow_dispatch: use provided inputs, fall back to schedule defaults
          # Nightly default: SWE l2plus — keeps footprint manageable while covering
          # the primary audience. Override via workflow_dispatch for other regions.
          # For workflow_dispatch, leaving country blank means all regions.
          INPUT_URL: ${{ vars.APP_URL }}
          INPUT_LEVEL: ${{ inputs.level || 'l2plus' }}
          INPUT_COUNTRY: ${{ github.event_name == 'schedule' && 'SWE' || inputs.country || '' }}
          INPUT_AFTER: ${{ inputs.after || '' }}
          INPUT_BEFORE: ${{ inputs.before || '' }}
          INPUT_DELAY: ${{ inputs.delay || '2000' }}
          INPUT_JITTER: ${{ inputs.jitter || 'true' }}
          INPUT_LIMIT: ${{ inputs.limit || '' }}
          INPUT_FORCE: ${{ inputs.force || 'false' }}
          INPUT_DRY_RUN: ${{ inputs.dry_run || 'false' }}
          INPUT_SKIP_SCORECARDS: ${{ inputs.skip_scorecards || 'false' }}
          INPUT_UPCOMING: ${{ inputs.upcoming || 'false' }}
        run: |
          ARGS="--url $INPUT_URL --level $INPUT_LEVEL --delay $INPUT_DELAY"
          if [ -n "$INPUT_COUNTRY" ];                then ARGS="$ARGS --country $INPUT_COUNTRY"; fi
          if [ -n "$INPUT_AFTER" ];                  then ARGS="$ARGS --after $INPUT_AFTER"; fi
          if [ -n "$INPUT_BEFORE" ];                 then ARGS="$ARGS --before $INPUT_BEFORE"; fi
          if [ -n "$INPUT_LIMIT" ];                  then ARGS="$ARGS --limit $INPUT_LIMIT"; fi
          if [ "$INPUT_JITTER" = "true" ];            then ARGS="$ARGS --jitter"; fi
          if [ "$INPUT_FORCE" = "true" ];             then ARGS="$ARGS --force"; fi
          if [ "$INPUT_DRY_RUN" = "true" ];           then ARGS="$ARGS --dry-run"; fi
          if [ "$INPUT_SKIP_SCORECARDS" = "true" ];   then ARGS="$ARGS --skip-scorecards"; fi
          if [ "$INPUT_UPCOMING" = "true" ];          then ARGS="$ARGS --upcoming"; fi
          echo "Running: pnpm tsx scripts/warm-cache.ts $ARGS"
          pnpm tsx scripts/warm-cache.ts $ARGS
