runtime: typescript

# configSchema canonical source: mcp/smithery-config-schema.json
# This inline copy is used by Smithery's hosted TypeScript runtime.
# For the external URL deployment the schema is pushed via the
# "Publish to Smithery Registry" GitHub Actions workflow (workflow_dispatch).
# When changing the schema, update BOTH this block and mcp/smithery-config-schema.json.
configSchema:
  type: object
  properties:
    baseUrl:
      type: string
      format: uri
      description: >-
        Base URL of the SSI Scoreboard instance.
        Defaults to https://scoreboard.urdr.dev

build:
  # The MCP server lives in the mcp/ subdirectory of this monorepo.
  # Install from the root first so mcp/ can resolve shared deps (zod, MCP SDK)
  # from the root node_modules, then build the Smithery bundle from mcp/.
  installCommand: "npm install"
  buildCommand: "cd mcp && npx @smithery/cli build"
